; ============================================================
; LARANJA V44L — Estacao WiFi Uniube/Laranja
; Base: V44 da Bela Vista + OTA via GitHub + POST direto Supabase.
;
; Compilar:  pio run -e UNIUBE_WIFI_LARANJA
; Flashar:   pio run -e UNIUBE_WIFI_LARANJA -t upload --upload-port /dev/cu.usbserial-XX
;
; Depois de compilar, copiar o .bin pro builds/ pra OTA pegar:
;   cp .pio/build/UNIUBE_WIFI_LARANJA/firmware.bin builds/UNIUBE_WIFI_LARANJA.bin
; e atualizar o arquivo VERSION (numerico crescente: "44L" -> "45L" -> ...)
; ============================================================

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800
lib_deps =
    4-20ma/ModbusMaster@^2.0.1
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    adafruit/Adafruit SSD1306@^2.5.10
    adafruit/Adafruit GFX Library@^1.11.10
    bblanchon/ArduinoJson@^7.0.0

; ---------- UNIUBE LARANJA WiFi (campus Uniube) ----------
; WiFi do campus Uniube (atencao: senha TEM ponto no final).
[env:UNIUBE_WIFI_LARANJA]
build_flags =
  -DDEVICE_CODIGO=\"UNIUBE_WIFI_LARANJA\"
  -DDISP_ID=\"efea0039-0864-4fce-b256-56f54b5c9b1c\"
  '-DWIFI_SSID="WIFI-UNIUBE"'
  '-DWIFI_PASS="Uniube@2026."'

; ---------- BELA VISTA WIFI (bancada — AP 101) ----------
; Estacao WiFi direto da Bela Vista. Sensor 7x1 LOTE VELHO. Mesmo
; firmware base V44 que provou funcionar. POST direto no Supabase.
[env:BELA_WIFI_EST1]
build_flags =
  -DDEVICE_CODIGO=\"BELA_WIFI_EST1\"
  -DDISP_ID=\"2f33249c-4c20-4f47-92c5-3989b50408d8\"
  '-DWIFI_SSID="AP 101"'
  '-DWIFI_PASS="Barbosan"'

; ---------- BELA VISTA WIFI — produção (Fazenda Bela Vista) ----------
[env:BELA_WIFI_EST1_PROD]
build_flags =
  -DDEVICE_CODIGO=\"BELA_WIFI_EST1\"
  -DDISP_ID=\"2f33249c-4c20-4f47-92c5-3989b50408d8\"
  '-DWIFI_SSID="Fazendabelavista 123"'
  '-DWIFI_PASS="Paulo2024#"'
