; ============================================================
; ESTACOES PIVOT - AiAgro
; 1 source (src/estacao.ino), N dispositivos via build_flags.
; SEM OTA (estacao de pivo nao tem WiFi). Flash sempre fisico.
;
; Compilar:  pio run -e CRISTALINA_PIVOT_EST1
; Flashar:   pio run -e CRISTALINA_PIVOT_EST1 -t upload --upload-port /dev/cu.usbserial-XX
; ============================================================

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800
lib_deps =
    sandeepmistry/LoRa@^0.8.0
    4-20ma/ModbusMaster@^2.0.1
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    bblanchon/ArduinoJson@^7.0.0

; ---------- CRISTALINA ----------
[env:CRISTALINA_PIVOT_EST1]
build_flags =
  -DORIGEM_ESTACAO=\"PIVOT_EST1\"

; ---------- UNIUBE ----------
[env:UNIUBE_PIVOT_EST1]
build_flags =
  -DORIGEM_ESTACAO=\"UNIUBE_PIVOT_EST1\"

; ---------- CRISTALINA TESTE (envia a cada 2 min, 1 envio) ----------
[env:CRISTALINA_PIVOT_EST1_TESTE]
build_flags =
  -DORIGEM_ESTACAO=\"PIVOT_EST1\"
  -DN_ENVIOS=1
  -DSLEEP_SEG=60
  -DFORCAR_ENVIO=1

; ---------- UNIUBE CAFÉ via LoRa — TESTE (1 min, força envio sem sensor) ----------
[env:UNIUBE_CAFE_LORA_TESTE]
build_flags =
  -DORIGEM_ESTACAO=\"UNIUBE_LORA_CAFE\"
  -DN_ENVIOS=1
  -DSLEEP_SEG=60
  -DFORCAR_ENVIO=1
  -DLOTE_VELHO=1
