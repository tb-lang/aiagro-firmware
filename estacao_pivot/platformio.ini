; ============================================================
; ESTACOES PIVOT - AiAgro
; 1 source (src/estacao.ino), N dispositivos via build_flags.
; SEM OTA (estacao de pivo nao tem WiFi). Flash sempre fisico.
;
; Compilar:  pio run -e CRISTALINA_PIVOT_EST1
; Flashar:   pio run -e CRISTALINA_PIVOT_EST1 -t upload --upload-port /dev/cu.usbserial-XX
; ============================================================

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800
lib_deps =
    sandeepmistry/LoRa@^0.8.0
    4-20ma/ModbusMaster@^2.0.1
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    bblanchon/ArduinoJson@^7.0.0

; ---------- CRISTALINA ----------
[env:CRISTALINA_PIVOT_EST1]
build_flags =
  -DORIGEM_ESTACAO=\"PIVOT_EST1\"

; ---------- UNIUBE (ambos slaves = LOTE NOVO) ----------
; Pivot é ligado na rede eletrica 220V — NÃO tem bateria.
; SEM_BATERIA=1 faz o firmware nao ler o ADC e mandar bat=0 (evita ruido).
[env:UNIUBE_PIVOT_EST1]
build_flags =
  -DORIGEM_ESTACAO=\"UNIUBE_PIVOT_EST1\"
  -DSEM_BATERIA=1

; ---------- CRISTALINA TESTE (envia a cada 2 min, 1 envio) ----------
[env:CRISTALINA_PIVOT_EST1_TESTE]
build_flags =
  -DORIGEM_ESTACAO=\"PIVOT_EST1\"
  -DN_ENVIOS=1
  -DSLEEP_SEG=60
  -DFORCAR_ENVIO=1

; ---------- UNIUBE CAFÉ via LoRa — TESTE (1 min, força envio sem sensor) ----------
[env:UNIUBE_CAFE_LORA_TESTE]
build_flags =
  -DORIGEM_ESTACAO=\"UNIUBE_LORA_CAFE\"
  -DN_ENVIOS=1
  -DSLEEP_SEG=60
  -DFORCAR_ENVIO=1
  -DLOTE_VELHO=1

; ---------- UNIUBE CAFÉ — ciclo 10 min (1 envio + 3min janela pluv) ----------
; Placa AI Agro custom (mesma pinagem da Cristalina). Le 7x1 (lote velho) + DHT,
; manda 1 pacote LoRa, abre 180s pra ver viradas do pluviometro (envia o total
; num pacote extra ao fim), e dorme ate completar 10 min.
[env:UNIUBE_CAFE_LORA_FULL_TESTE]
build_flags =
  -DORIGEM_ESTACAO=\"UNIUBE_LORA_CAFE\"
  -DN_ENVIOS=1
  -DSLEEP_SEG=420
  -DFORCAR_ENVIO=1
  -DLOTE_VELHO=1
  -DMONITOR_PLUV_SEG=180

; ---------- BELA VISTA LORA — TESTE (10 min, pluv 3 min) ----------
[env:BELA_LORA_EST1_TESTE]
build_flags =
  -DORIGEM_ESTACAO=\"BELA_LORA_EST1\"
  -DN_ENVIOS=1
  -DSLEEP_SEG=420
  -DFORCAR_ENVIO=1
  -DLOTE_VELHO=1
  -DMONITOR_PLUV_SEG=180

; ---------- BELA VISTA LORA — PRODUÇÃO (24h, 3 envios por ciclo) ----------
; Fazenda Bela Vista — estacao LoRa de campo. 1 sensor 7x1 lote velho slave 1,
; DHT22, pluviometro Hall A3144, voltimetro bateria. Manda LoRa pra BELA_LORA_RECEPTORA.
; Boot/UNDEFINED -> manda imediato. Depois dorme 24h ate proximo ciclo.
[env:BELA_LORA_EST1]
build_flags =
  -DORIGEM_ESTACAO=\"BELA_LORA_EST1\"
  -DN_ENVIOS=3
  -DSLEEP_SEG=86400
  -DFORCAR_ENVIO=1
  -DLOTE_VELHO=1

; ---------- UNIUBE CAFÉ LORA — PRODUÇÃO (24h, 3 envios por ciclo) ----------
; Uniube Cafe — estacao LoRa de campo. 1 sensor 7x1 lote velho slave 1,
; DHT22, voltimetro bateria. Manda LoRa pra UNIUBE_LORA_RECEPTORA.
; Boot/UNDEFINED -> manda imediato. Depois dorme 24h ate proximo ciclo.
[env:UNIUBE_CAFE_LORA]
build_flags =
  -DORIGEM_ESTACAO=\"UNIUBE_LORA_CAFE\"
  -DN_ENVIOS=3
  -DSLEEP_SEG=86400
  -DFORCAR_ENVIO=1
  -DLOTE_VELHO=1
