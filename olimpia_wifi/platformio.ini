; ============================================================
; OLIMPIA WiFi — projeto INDEPENDENTE (separado do laranja_v44L em 06/jun)
; Estacao WiFi da Olimpia. Sensor 7x1 LOTE VELHO. Rede "churrasqueira" ABERTA.
; OTA proprio: olimpia_wifi/VERSION + olimpia_wifi/builds/OLIMPIA_WIFI_EST1.bin
;
; Compilar prod: pio run -e OLIMPIA_WIFI_EST1
; Flashar:       pio run -e OLIMPIA_WIFI_EST1 -t upload --upload-port /dev/cu.usbserial-XX
; Atualizar OTA: copiar .bin pra builds/OLIMPIA_WIFI_EST1.bin e subir VERSION (o1 -> o2 -> ...)
; ============================================================

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800
lib_deps =
    4-20ma/ModbusMaster@^2.0.1
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    adafruit/Adafruit SSD1306@^2.5.10
    adafruit/Adafruit GFX Library@^1.11.10
    bblanchon/ArduinoJson@^7.0.0

; ---------- OLIMPIA WIFI — PRODUÇÃO ("churrasqueira" — rede aberta) ----------
; Rede ABERTA (sem senha) — WIFI_PASS="" conecta sem encryption. Retry agressivo.
[env:OLIMPIA_WIFI_EST1]
build_flags =
  -DDEVICE_CODIGO=\"OLIMPIA_WIFI_EST1\"
  -DDISP_ID=\"862a4d1c-b9e5-4da3-b712-85a284670fca\"
  -DWIFI_RETRY_AGRESSIVO=1
  '-DWIFI_SSID="churrasqueira"'
  '-DWIFI_PASS=""'

; ---------- OLIMPIA WIFI — TESTE BANCADA (AP 101) ----------
[env:OLIMPIA_WIFI_EST1_BANCADA]
build_flags =
  -DDEVICE_CODIGO=\"OLIMPIA_WIFI_EST1\"
  -DDISP_ID=\"862a4d1c-b9e5-4da3-b712-85a284670fca\"
  -DWIFI_RETRY_AGRESSIVO=1
  '-DWIFI_SSID="AP 101"'
  '-DWIFI_PASS="Barbosan"'
