; ============================================================
; RECEPTORAS LORA - AiAgro
; 1 source (src/receptora.ino), N dispositivos via build_flags.
;
; Compilar um device:  pio run -e UNIUBE_PIVOT_RECEPTORA
; Compilar todos:      pio run
; Flashar um device:   pio run -e UNIUBE_PIVOT_RECEPTORA -t upload --upload-port /dev/cu.usbserial-XX
;
; Apos compilar, copiar o .bin pro builds/:
;   cp .pio/build/<CODIGO>/firmware.bin builds/<CODIGO>.bin
; ============================================================

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800
lib_deps =
    sandeepmistry/LoRa@^0.8.0
    bblanchon/ArduinoJson@^7.0.0

; ---------- CRISTALINA PIVOT ----------
[env:CRISTALINA_PIVOT_RECEPTORA]
build_flags =
  -DDEVICE_CODIGO=\"CRISTALINA_PIVOT_RECEPTORA\"
  -DESTACAO_ESPERADA=\"PIVOT_EST1\"
  -DDISP_ID_ESTACAO=\"a354757c-6a63-4a02-9ec8-554ca8004c64\"
  -DDISP_ID_RECEPTORA=\"1473ecf6-9ec7-4708-a784-3057dcf98d76\"
  -DWIFI_SSID=\"MECSEGUR2\"
  -DWIFI_PASS=\"12345678\"

; ---------- UNIUBE PIVOT ----------
[env:UNIUBE_PIVOT_RECEPTORA]
build_flags =
  -DDEVICE_CODIGO=\"UNIUBE_PIVOT_RECEPTORA\"
  -DESTACAO_ESPERADA=\"UNIUBE_PIVOT_EST1\"
  -DDISP_ID_ESTACAO=\"19ac767a-1c2a-4257-a7fa-0afdea4b9b27\"
  -DDISP_ID_RECEPTORA=\"c84191fb-21cb-45b0-985e-69e137c2e8ad\"
  -DWIFI_SSID=\"Ap6401-2G\"
  -DWIFI_PASS=\"21012003\"

; ---------- BELA VISTA LORA (bancada — AP 101) ----------
[env:BELA_LORA_RECEPTORA]
build_flags =
  -DDEVICE_CODIGO=\"BELA_LORA_RECEPTORA\"
  -DESTACAO_ESPERADA=\"BELA_LORA_EST1\"
  -DDISP_ID_ESTACAO=\"2c15890d-e3c5-4ded-a566-f9d60740f906\"
  -DDISP_ID_RECEPTORA=\"e3ec937e-0f84-42b2-95bc-56556f1d03ee\"
  '-DWIFI_SSID="AP 101"'
  '-DWIFI_PASS="Barbosan"'

; ---------- BELA VISTA LORA — PRODUÇÃO (Fazenda Bela Vista) ----------
; OTA usa este bin como builds/BELA_LORA_RECEPTORA.bin (DEVICE_CODIGO igual).
[env:BELA_LORA_RECEPTORA_PROD]
build_flags =
  -DDEVICE_CODIGO=\"BELA_LORA_RECEPTORA\"
  -DESTACAO_ESPERADA=\"BELA_LORA_EST1\"
  -DDISP_ID_ESTACAO=\"2c15890d-e3c5-4ded-a566-f9d60740f906\"
  -DDISP_ID_RECEPTORA=\"e3ec937e-0f84-42b2-95bc-56556f1d03ee\"
  '-DWIFI_SSID="Fazendabelavista123.2G"'
  '-DWIFI_PASS="Paulo2024#"'

; ---------- BELA VISTA LORA — TESTE ALCANCE (aceita EST1 + FAZENDA_EST2) ----------
; Igual ao PROD mas aceita uma 2a estacao com origem=FAZENDA_EST2 pra teste de alcance.
; Os pacotes da FAZENDA_EST2 sobem com o MESMO UUID da estacao principal — pra
; distinguir, a estacao de teste deve compilar com VERSAO_FW="TESTE".
[env:BELA_LORA_RECEPTORA_PROD_TESTE]
build_flags =
  -DDEVICE_CODIGO=\"BELA_LORA_RECEPTORA\"
  -DESTACAO_ESPERADA=\"BELA_LORA_EST1\"
  -DDISP_ID_ESTACAO=\"2c15890d-e3c5-4ded-a566-f9d60740f906\"
  -DDISP_ID_RECEPTORA=\"e3ec937e-0f84-42b2-95bc-56556f1d03ee\"
  -DTESTE_FAZENDA_EST2=1
  '-DWIFI_SSID="Fazendabelavista123.2G"'
  '-DWIFI_PASS="Paulo2024#"'

; ---------- OLIMPIA LORA ----------
[env:OLIMPIA_LORA_RECEPTORA]
build_flags =
  -DDEVICE_CODIGO=\"OLIMPIA_LORA_RECEPTORA\"
  -DESTACAO_ESPERADA=\"OLIMPIA_LORA_EST1\"
  -DDISP_ID_ESTACAO=\"862a4d1c-b9e5-4da3-b712-85a284670fca\"
  -DDISP_ID_RECEPTORA=\"fa718bb9-8918-4abe-8851-d4d0c8c53773\"
  -DWIFI_SSID=\"Ap6401-2G\"
  -DWIFI_PASS=\"21012003\"

; ---------- UNIUBE LORA — atende Cafe + Pivot (multi-estacao) ----------
; 30/mai: virou multi-estacao. Mapa origem->UUID hardcoded no .ino quando
; MULTI_ESTACOES esta definido:
;   UNIUBE_LORA_CAFE  -> 92c33471-...   UNIUBE_PIVOT_EST1 -> 19ac767a-...
; WiFi do campus Uniube (atencao: senha TEM ponto no final).
[env:UNIUBE_LORA_RECEPTORA]
build_flags =
  -DDEVICE_CODIGO=\"UNIUBE_LORA_RECEPTORA\"
  -DMULTI_ESTACOES=1
  -DDISP_ID_RECEPTORA=\"0347f8ac-eb1f-4ce9-b140-ef183179d6b6\"
  '-DWIFI_SSID="WIFI-UNIUBE"'
  '-DWIFI_PASS="Uniube@2026."'
