; ============================================================
; SCANNER DE REGISTRADORES 7x1 - diagnostico de calibracao
; Le um bloco grande de holding + input registers e imprime em loop.
; Sem deep sleep, sem LoRa, sem WiFi. So serial 115200.
;
; Flashar:  pio run -e SCANNER -t upload --upload-port /dev/cu.usbserial-XX
; Monitor:  115200
; ============================================================
[env:SCANNER]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800
lib_deps =
    4-20ma/ModbusMaster@^2.0.1
    sandeepmistry/LoRa@^0.8.0
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    adafruit/Adafruit SSD1306@^2.5.10
    adafruit/Adafruit GFX Library@^1.11.10
    bblanchon/ArduinoJson@^7.0.0
