; ============================================================
; BELA VISTA WiFi — projeto INDEPENDENTE (separado do laranja_v44L em 06/jun)
; Estacao WiFi da Fazenda Bela Vista. Sensor 7x1 LOTE VELHO. POST direto Supabase.
; OTA proprio: bela_wifi/VERSION + bela_wifi/builds/BELA_WIFI_EST1.bin
;
; Compilar prod: pio run -e BELA_WIFI_EST1_PROD
; Flashar:       pio run -e BELA_WIFI_EST1_PROD -t upload --upload-port /dev/cu.usbserial-XX
; Atualizar OTA: copiar .bin pra builds/BELA_WIFI_EST1.bin e subir VERSION (b1 -> b2 -> ...)
; ============================================================

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800
lib_deps =
    4-20ma/ModbusMaster@^2.0.1
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    adafruit/Adafruit SSD1306@^2.5.10
    adafruit/Adafruit GFX Library@^1.11.10
    bblanchon/ArduinoJson@^7.0.0

; ---------- BELA VISTA WIFI — PRODUÇÃO (Fazenda Bela Vista) ----------
; Sinal ~18% -> retry agressivo (10 tentativas). Reconexao limpa a cada envio.
[env:BELA_WIFI_EST1_PROD]
build_flags =
  -DDEVICE_CODIGO=\"BELA_WIFI_EST1\"
  -DDISP_ID=\"2f33249c-4c20-4f47-92c5-3989b50408d8\"
  -DWIFI_RETRY_AGRESSIVO=1
  '-DWIFI_SSID="Fazendabelavista 123"'
  '-DWIFI_PASS="Paulo2024#"'

; ---------- BELA VISTA WIFI — TESTE BANCADA (AP 101) ----------
[env:BELA_WIFI_EST1]
build_flags =
  -DDEVICE_CODIGO=\"BELA_WIFI_EST1\"
  -DDISP_ID=\"2f33249c-4c20-4f47-92c5-3989b50408d8\"
  '-DWIFI_SSID="AP 101"'
  '-DWIFI_PASS="Barbosan"'
