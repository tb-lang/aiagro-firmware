; ============================================================
; UNIUBE LARANJA WiFi — projeto INDEPENDENTE (separado do laranja_v44L em 06/jun)
; Estacao WiFi do campus Uniube (pomar de laranja). Sensor 7x1 LOTE VELHO.
; OTA proprio: laranja_wifi/VERSION + laranja_wifi/builds/UNIUBE_WIFI_LARANJA.bin
;
; Compilar: pio run -e UNIUBE_WIFI_LARANJA
; Flashar:  pio run -e UNIUBE_WIFI_LARANJA -t upload --upload-port /dev/cu.usbserial-XX
; Atualizar OTA: copiar .bin pra builds/UNIUBE_WIFI_LARANJA.bin e subir VERSION (l1 -> l2 -> ...)
; ============================================================

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800
lib_deps =
    4-20ma/ModbusMaster@^2.0.1
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    adafruit/Adafruit SSD1306@^2.5.10
    adafruit/Adafruit GFX Library@^1.11.10
    bblanchon/ArduinoJson@^7.0.0

; ---------- UNIUBE LARANJA WiFi (campus Uniube) ----------
; WiFi do campus Uniube (atencao: senha TEM ponto no final).
[env:UNIUBE_WIFI_LARANJA]
build_flags =
  -DDEVICE_CODIGO=\"UNIUBE_WIFI_LARANJA\"
  -DDISP_ID=\"efea0039-0864-4fce-b256-56f54b5c9b1c\"
  '-DWIFI_SSID="WIFI-UNIUBE"'
  '-DWIFI_PASS="Uniube@2026."'

; ---------- LARANJA — TESTE BANCADA (AP 101) ----------
[env:UNIUBE_WIFI_LARANJA_BANCADA]
build_flags =
  -DDEVICE_CODIGO=\"UNIUBE_WIFI_LARANJA\"
  -DDISP_ID=\"efea0039-0864-4fce-b256-56f54b5c9b1c\"
  '-DWIFI_SSID="AP 101"'
  '-DWIFI_PASS="Barbosan"'
